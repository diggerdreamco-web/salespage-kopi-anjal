<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Pembayaran - Anjal'e</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brown-900) 0%, var(--brown-700) 100%);
      text-align: center;
      padding: 40px 24px;
    }
    .result-box {
      background: var(--white);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    }
    .result-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 24px;
    }
    .result-icon.success { background: #e8f5e9; color: #27ae60; }
    .result-icon.failed  { background: #fdecea; color: #c0392b; }
    .result-icon.pending { background: #fef3c7; color: #b45309; }
    .result-box h1 {
      font-size: 2rem;
      color: var(--brown-900);
      margin-bottom: 12px;
    }
    .result-box p {
      color: var(--text-light);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .result-details {
      background: var(--brown-50);
      border-radius: 12px;
      padding: 20px;
      margin: 28px 0;
      text-align: left;
    }
    .result-details p {
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .result-details strong {
      color: var(--brown-800);
    }
    .result-meta {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 12px;
      word-break: break-all;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .result-box { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="result-page">
    <div class="result-box" id="resultBox">
      <!-- Content di-inject oleh JS berdasarkan status_id -->
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const statusId = params.get('status_id');     // 1=Success, 2=Pending, 3=Failed
      const billCode = params.get('billcode') || '';
      const orderId  = params.get('order_id') || '';
      const msg      = params.get('msg') || '';

      const box = document.getElementById('resultBox');
      let html = '';

      if (statusId === '1') {
        // ===== SUCCESS =====
        document.title = "Pembayaran Berjaya - Anjal'e";
        html = `
          <div class="result-icon success">&#10003;</div>
          <h1>Pembayaran Berjaya!</h1>
          <p>Terima kasih kerana membeli Anjal'e.</p>
          <div class="result-details">
            <p><strong>Apa seterusnya?</strong></p>
            <p>1. Anda akan menerima email pengesahan dalam beberapa minit.</p>
            <p>2. Pesanan anda akan diproses dan dihantar dalam 1-2 hari bekerja.</p>
            <p>3. Tracking number akan dihantar melalui SMS/WhatsApp.</p>
            ${billCode ? `<p class="result-meta">Bill Code: ${billCode}</p>` : ''}
          </div>
          <p>Ada soalan? Hubungi kami di WhatsApp.</p>
          <div class="btn-row">
            <a href="/" class="btn btn-primary">Kembali ke Laman Utama</a>
          </div>
        `;
      } else if (statusId === '3') {
        // ===== FAILED / CANCELLED =====
        document.title = "Pembayaran Tidak Berjaya - Anjal'e";
        html = `
          <div class="result-icon failed">&#10007;</div>
          <h1>Pembayaran Tidak Berjaya</h1>
          <p>Transaksi anda telah dibatalkan atau gagal.</p>
          <p>Jangan risau — tiada caj dikenakan pada akaun anda.</p>
          <div class="result-details">
            <p><strong>Apa boleh buat?</strong></p>
            <p>1. Cuba bayar semula dengan bank/kad yang sama atau lain.</p>
            <p>2. Pastikan baki akaun mencukupi.</p>
            <p>3. Pastikan sambungan internet stabil.</p>
            ${msg ? `<p class="result-meta">Sebab: ${msg}</p>` : ''}
            ${billCode ? `<p class="result-meta">Ref: ${billCode}</p>` : ''}
          </div>
          <div class="btn-row">
            <a href="/#order" class="btn btn-primary">Cuba Bayar Semula</a>
            <a href="/" class="btn btn-outline">Kembali ke Laman Utama</a>
          </div>
        `;
      } else {
        // ===== PENDING / UNKNOWN =====
        document.title = "Pembayaran Diproses - Anjal'e";
        html = `
          <div class="result-icon pending">&#8987;</div>
          <h1>Pembayaran Dalam Proses</h1>
          <p>Kami sedang menunggu pengesahan daripada bank.</p>
          <p>Jika anda telah membayar, status akan dikemaskini tidak lama lagi.</p>
          <div class="result-details">
            <p><strong>Status:</strong> Menunggu pengesahan bank</p>
            ${billCode ? `<p class="result-meta">Bill Code: ${billCode}</p>` : ''}
            ${orderId ? `<p class="result-meta">Order ID: ${orderId}</p>` : ''}
          </div>
          <div class="btn-row">
            <a href="/#order" class="btn btn-primary">Cuba Bayar Semula</a>
            <a href="/" class="btn btn-outline">Kembali ke Laman Utama</a>
          </div>
        `;
      }

      box.innerHTML = html;
    })();
  </script>
</body>
</html>
